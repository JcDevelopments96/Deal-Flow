<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deal Docket — Real Estate Investment Platform</title>
  <meta name="description" content="Deal Docket — the real estate investor's end-to-end toolkit. Live MLS listings, off-market wholesale leads, county-level market map, deal analysis, AI-powered inspection summaries, and a vetted local-pro directory in one place." />
  <meta name="keywords" content="Deal Docket, real estate investment, BRRRR, deal analyzer, wholesale, MLS listings, market intel, rental property, Airbnb, cash flow calculator" />
  <meta name="author" content="Deal Docket" />

  <!-- AI crawler opt-out — well-behaved scrapers (GPTBot, ClaudeBot, etc.)
       respect these. Won't stop bad actors, but signals "not for ingest." -->
  <meta name="robots" content="noai, noimageai" />
  <meta name="googlebot" content="noai, noimageai" />

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Deal Docket — Real Estate Investment Platform" />
  <meta property="og:description" content="The real estate investor's end-to-end toolkit. Listings, wholesale leads, deal analysis, AI inspections, and a local-pro directory — in one place." />
  <meta property="og:url" content="https://your-domain.com" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  
  <!-- Fonts - Preload for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Theme color -->
  <meta name="theme-color" content="#0B0F14" />
  
  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <style>
    /* Prevent flash of unstyled content */
    body { 
      margin: 0; 
      background: #0B0F14; 
      color: #E8E4D9;
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8A93A0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">Loading Deal Docket...</div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
